# Supabase CLI config — used by `supabase start` for local dev and by
# `supabase db push` / `db reset` for managing the linked cloud project.
#
# Linked cloud project: cwxflidwpgsqlkmcbxcn (see .mcp.json)

project_id = "swocal"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "http://localhost:3001",                 # business app dev
  "exp://127.0.0.1:8081",                  # expo go on device
  "swocal://"                              # mobile app deep link
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false               # signup logs the user in immediately — no email confirmation

[functions.context]
verify_jwt = false                         # public — called before signin

[functions.generate-offers]
verify_jwt = true

[functions.redeem]
verify_jwt = true
