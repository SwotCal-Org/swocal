<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); }
.row { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px dashed var(--border-soft); }
.row:last-child { border-bottom: 0; }
.bar { background: var(--swo-coral); height: 16px; border-radius: 4px; }
.tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); width: 64px; }
.px { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); width: 56px; text-align: right; }
.use { font-size: 12px; color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="row"><span class="tok">--s-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span><span class="use">hairline gap</span></div>
  <div class="row"><span class="tok">--s-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span><span class="use">tight gaps · chip padding y</span></div>
  <div class="row"><span class="tok">--s-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span><span class="use">small gaps · chip padding x</span></div>
  <div class="row"><span class="tok">--s-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span><span class="use">card padding y · default gap</span></div>
  <div class="row"><span class="tok">--s-5</span><span class="bar" style="width:20px"></span><span class="px">20px</span><span class="use">card padding x</span></div>
  <div class="row"><span class="tok">--s-6</span><span class="bar" style="width:24px"></span><span class="px">24px</span><span class="use">section gap (mobile)</span></div>
  <div class="row"><span class="tok">--s-7</span><span class="bar" style="width:32px"></span><span class="px">32px</span><span class="use">screen padding</span></div>
  <div class="row"><span class="tok">--s-8</span><span class="bar" style="width:40px"></span><span class="px">40px</span><span class="use">section gap (web)</span></div>
  <div class="row"><span class="tok">--s-9</span><span class="bar" style="width:56px"></span><span class="px">56px</span><span class="use">major rhythm</span></div>
</div>
</body></html>
