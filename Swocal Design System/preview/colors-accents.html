<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 28px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw { border-radius: 14px; overflow: hidden; background: var(--swo-paper); border: 1px solid var(--border-soft); box-shadow: var(--sh-1); }
.sw .c { height: 78px; }
.sw .m { padding: 10px 12px; display:flex; flex-direction:column; gap:2px; }
.sw .n { font-size: 13px; font-weight: 600; color: var(--fg); }
.sw .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.sw .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="sw"><div class="c" style="background:#8DB36B"></div><div class="m"><span class="n">Olive sage</span><span class="h">#8DB36B</span><span class="v">--swo-mint · success/match</span></div></div>
    <div class="sw"><div class="c" style="background:#5F8842"></div><div class="m"><span class="n">Olive deep</span><span class="h">#5F8842</span><span class="v">--swo-mint-deep</span></div></div>
    <div class="sw"><div class="c" style="background:#E1EBC9"></div><div class="m"><span class="n">Olive soft</span><span class="h">#E1EBC9</span><span class="v">--swo-mint-soft</span></div></div>
    <div class="sw"><div class="c" style="background:#A14E5E"></div><div class="m"><span class="n">Terracotta rose</span><span class="h">#A14E5E</span><span class="v">--swo-plum · evening</span></div></div>
    <div class="sw"><div class="c" style="background:#6E9C9B"></div><div class="m"><span class="n">Dusty teal</span><span class="h">#6E9C9B</span><span class="v">--swo-sky · weather</span></div></div>
    <div class="sw"><div class="c" style="background:#B94A35"></div><div class="m"><span class="n">Rust</span><span class="h">#B94A35</span><span class="v">--swo-danger · swipe-left</span></div></div>
  </div>
</div>
</body></html>
