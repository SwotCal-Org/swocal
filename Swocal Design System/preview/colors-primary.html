<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 28px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw { border-radius: 14px; overflow: hidden; background: var(--swo-paper); border: 1px solid var(--border-soft); box-shadow: var(--sh-1); }
.sw .c { height: 78px; }
.sw .m { padding: 10px 12px; display:flex; flex-direction:column; gap:2px; }
.sw .n { font-size: 13px; font-weight: 600; color: var(--fg); }
.sw .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.sw .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="sw"><div class="c" style="background:#FF6A4D"></div><div class="m"><span class="n">Coral</span><span class="h">#FF6A4D</span><span class="v">--swo-coral · primary</span></div></div>
    <div class="sw"><div class="c" style="background:#E04A2E"></div><div class="m"><span class="n">Coral deep</span><span class="h">#E04A2E</span><span class="v">--swo-coral-deep · press</span></div></div>
    <div class="sw"><div class="c" style="background:#FFD9CD"></div><div class="m"><span class="n">Coral soft</span><span class="h">#FFD9CD</span><span class="v">--swo-coral-soft · chip</span></div></div>
    <div class="sw"><div class="c" style="background:#F5B945"></div><div class="m"><span class="n">Mustard</span><span class="h">#F5B945</span><span class="v">--swo-mustard · sun/time</span></div></div>
    <div class="sw"><div class="c" style="background:#D9961F"></div><div class="m"><span class="n">Mustard deep</span><span class="h">#D9961F</span><span class="v">--swo-mustard-deep</span></div></div>
    <div class="sw"><div class="c" style="background:#FFEFC9"></div><div class="m"><span class="n">Mustard soft</span><span class="h">#FFEFC9</span><span class="v">--swo-mustard-soft</span></div></div>
  </div>
</div>
</body></html>
