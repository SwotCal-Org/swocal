<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); }
.row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 90px; text-transform: uppercase; letter-spacing: .06em; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 2px solid var(--swo-ink); background: var(--swo-paper); color: var(--swo-ink); box-shadow: 2px 3px 0 rgba(42,31,26,.18); }
.chip.coral { background: var(--swo-coral); color: white; }
.chip.mustard { background: var(--swo-mustard); }
.chip.mint { background: var(--swo-mint); color: white; }
.chip.sky { background: var(--swo-sky); color: white; }
.chip.plain { background: var(--swo-cream-deep); border-color: transparent; box-shadow: none; color: var(--swo-ink-2); font-weight: 500; }
.stamp { display: inline-block; padding: 8px 16px; background: var(--swo-coral); color: white; font-family: var(--font-display); font-weight: 900; font-size: 16px; letter-spacing: 0.04em; text-transform: uppercase; border: 2px solid var(--swo-ink); border-radius: 6px; transform: rotate(-4deg); box-shadow: 3px 4px 0 rgba(42,31,26,.95); }
</style>
</head><body>
<div class="frame">
  <div class="row"><span class="label">Sticker</span>
    <span class="chip coral">15% off</span>
    <span class="chip mustard">☀️ 21°C</span>
    <span class="chip sky">☁️ 11°C</span>
    <span class="chip mint">✓ Saved</span>
    <span class="chip">⏱ 2h left</span>
  </div>
  <div class="row"><span class="label">Plain</span>
    <span class="chip plain">Coffee</span>
    <span class="chip plain">200m away</span>
    <span class="chip plain">Marktplatz 4</span>
    <span class="chip plain">Quiet hours</span>
  </div>
  <div class="row"><span class="label">Stamps</span>
    <span class="stamp">It's a match</span>
    <span class="stamp" style="background: var(--swo-mint); transform: rotate(3deg)">Redeemed</span>
    <span class="stamp" style="background: var(--swo-mustard); color: var(--swo-ink); transform: rotate(-2deg); font-size: 12px">New</span>
  </div>
</div>
</body></html>
