<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
.cell { background: var(--swo-paper); border: 1px solid var(--border-soft); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.cell img { width: 56px; height: 56px; }
.cell .lbl { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="cell"><img src="../assets/stickers/heart.svg" alt=""><span class="lbl">heart</span></div>
    <div class="cell"><img src="../assets/stickers/sun.svg" alt=""><span class="lbl">sun</span></div>
    <div class="cell"><img src="../assets/stickers/cloud.svg" alt=""><span class="lbl">cloud</span></div>
    <div class="cell"><img src="../assets/stickers/pin.svg" alt=""><span class="lbl">pin</span></div>
    <div class="cell"><img src="../assets/stickers/sparkle.svg" alt=""><span class="lbl">sparkle</span></div>
    <div class="cell"><img src="../assets/stickers/coffee.svg" alt=""><span class="lbl">coffee</span></div>
    <div class="cell"><img src="../assets/stickers/croissant.svg" alt=""><span class="lbl">croissant</span></div>
    <div class="cell" style="background:var(--swo-coral); color: white"><span style="font-size: 30px">♥</span><span class="lbl" style="color: rgba(255,255,255,0.8)">on coral</span></div>
    <div class="cell" style="background:var(--swo-mint); color: white"><span style="font-size: 30px">✓</span><span class="lbl" style="color: rgba(255,255,255,0.8)">on mint</span></div>
    <div class="cell" style="background:var(--swo-mustard)"><span style="font-size: 30px">☀</span><span class="lbl" style="color: rgba(0,0,0,0.5)">on mustard</span></div>
    <div class="cell" style="background:var(--swo-ink); color: var(--swo-cream)"><span style="font-size: 30px">📍</span><span class="lbl" style="color: rgba(255,255,255,0.7)">on ink</span></div>
    <div class="cell"><span style="font-size: 30px">⏱</span><span class="lbl">unicode</span></div>
  </div>
</div>
</body></html>
