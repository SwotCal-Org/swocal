<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 28px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { border-radius: 14px; overflow: hidden; background: var(--swo-paper); border: 1px solid var(--border-soft); box-shadow: var(--sh-1); }
.sw .c { height: 78px; border-bottom: 1px solid var(--border-soft); display:flex; align-items:center; justify-content:center; font-family: var(--font-display); font-weight: 700; font-size: 28px; }
.sw .m { padding: 10px 12px; display:flex; flex-direction:column; gap:2px; }
.sw .n { font-size: 13px; font-weight: 600; color: var(--fg); }
.sw .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.sw .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="sw"><div class="c" style="background:#FFFEFB; color:#2A1F1A">Aa</div><div class="m"><span class="n">Ink</span><span class="h">#2A1F1A</span><span class="v">--swo-ink · primary</span></div></div>
    <div class="sw"><div class="c" style="background:#FFFEFB; color:#5C4A3F">Aa</div><div class="m"><span class="n">Ink-2</span><span class="h">#5C4A3F</span><span class="v">--swo-ink-2 · secondary</span></div></div>
    <div class="sw"><div class="c" style="background:#FFFEFB; color:#8B7969">Aa</div><div class="m"><span class="n">Ink-3</span><span class="h">#8B7969</span><span class="v">--swo-ink-3 · tertiary</span></div></div>
    <div class="sw"><div class="c" style="background:#FFFEFB; color:#C9B9A6">Aa</div><div class="m"><span class="n">Ink-4</span><span class="h">#C9B9A6</span><span class="v">--swo-ink-4 · divider</span></div></div>
  </div>
</div>
</body></html>
