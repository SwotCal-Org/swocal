<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); }
.row { display: flex; gap: 14px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
.label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 90px; text-transform: uppercase; letter-spacing: .06em; }
.btn { font-family: var(--font-body); font-weight: 600; font-size: 15px; border-radius: 12px; padding: 12px 22px; border: none; cursor: pointer; transition: all 220ms cubic-bezier(0.34, 1.56, 0.64, 1); }
.primary { background: var(--swo-coral); color: white; box-shadow: 0 1px 0 rgba(70,40,20,.06), 0 4px 14px rgba(70,40,20,.10); }
.primary.hover { transform: scale(1.02); }
.primary.press { background: var(--swo-coral-deep); transform: scale(0.96); box-shadow: 0 1px 0 rgba(70,40,20,.05); }
.secondary { background: var(--swo-paper); color: var(--swo-ink); border: 1.5px solid var(--swo-ink); }
.ghost { background: transparent; color: var(--swo-ink); border: 0; padding: 12px 14px; }
.disabled { background: var(--swo-coral); color: white; opacity: 0.45; cursor: not-allowed; }
</style>
</head><body>
<div class="frame">
  <div class="row"><span class="label">Primary</span>
    <button class="btn primary">Yes please</button>
    <button class="btn primary hover">Yes please</button>
    <button class="btn primary press">Yes please</button>
    <button class="btn disabled">Yes please</button>
  </div>
  <div class="row"><span class="label">Secondary</span>
    <button class="btn secondary">Not for now</button>
    <button class="btn ghost">Skip</button>
  </div>
  <div class="row"><span class="label">FAB pair</span>
    <button class="btn primary" style="border-radius:999px; width:56px; height:56px; padding:0; font-size: 22px">♥</button>
    <button class="btn secondary" style="border-radius:999px; width:56px; height:56px; padding:0; font-size: 18px; border-color: var(--swo-ink-3); color: var(--swo-ink-3)">✕</button>
    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3)">swipe-screen action pair · 56×56</span>
  </div>
</div>
</body></html>
