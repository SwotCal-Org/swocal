<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); display: flex; gap: 24px; align-items: center; }
.bar { flex: 1; max-width: 380px; background: var(--swo-paper); border-radius: 999px; padding: 10px 18px; border: 1px solid var(--border-soft); display: flex; align-items: center; gap: 14px; box-shadow: var(--sh-1); }
.bar .w { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px; }
.bar .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--swo-ink-3); }
.bar .t { font-size: 14px; color: var(--swo-ink-2); }
.bar .city { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--swo-ink); margin-left: auto; }
.notes { font-size: 12px; color: var(--fg-3); line-height: 1.5; max-width: 240px; }
.notes b { color: var(--fg); }
</style>
</head><body>
<div class="frame">
  <div class="bar">
    <span class="w">☁️ 11°C</span>
    <span class="dot"></span>
    <span class="t">Lunch · Tue</span>
    <span class="city">Stuttgart</span>
  </div>
  <div class="notes">
    <p><b>Context bar</b> — always-visible top strip. Updates every 60s with weather, time-of-day, day, city. Glass-blurs over photo screens; solid cream elsewhere.</p>
  </div>
</div>
</body></html>
