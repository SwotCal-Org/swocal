<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 36px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.row2 { margin-top: 24px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.box { background: var(--swo-paper); border-radius: 18px; padding: 22px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; }
.name { font-size: 13px; font-weight: 700; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 4px; }
.use { font-size: 12px; color: var(--fg-2); }
.sticker { background: var(--swo-mustard); border: 2px solid var(--swo-ink); border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 700; display: inline-block; }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="box" style="box-shadow: 0 1px 0 rgba(70,40,20,.05), 0 2px 6px rgba(70,40,20,.06)"><div><div class="name">--sh-1</div><div class="tok">soft lift</div></div><div class="use">feed cards at rest</div></div>
    <div class="box" style="box-shadow: 0 1px 0 rgba(70,40,20,.06), 0 4px 14px rgba(70,40,20,.10)"><div><div class="name">--sh-2</div><div class="tok">floating</div></div><div class="use">raised buttons, headers</div></div>
    <div class="box" style="box-shadow: 0 2px 0 rgba(70,40,20,.06), 0 12px 28px rgba(70,40,20,.14)"><div><div class="name">--sh-3</div><div class="tok">modal</div></div><div class="use">match overlay, sheets</div></div>
  </div>
  <div class="row2">
    <div class="box" style="box-shadow: 0 4px 0 rgba(70,40,20,.06), 0 20px 48px rgba(70,40,20,.18)"><div><div class="name">--sh-4</div><div class="tok">above-everything</div></div><div class="use">active swipe card, toast</div></div>
    <div class="box" style="background: var(--swo-cream); display:flex; align-items:center; justify-content:center; gap: 14px"><span class="sticker" style="box-shadow: 3px 4px 0 rgba(42,31,26,.95)">MATCH</span><div><div class="name">--sh-sticker</div><div class="tok">3×4 hard espresso offset</div></div></div>
  </div>
</div>
</body></html>
