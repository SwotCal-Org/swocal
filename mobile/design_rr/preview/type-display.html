<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 32px; font-family: var(--font-body); }
.row { display: grid; grid-template-columns: 80px 1fr 130px; align-items: baseline; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border-soft); }
.row:last-child { border-bottom: 0; }
.tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.spec { font-family: var(--font-display); color: var(--fg); }
.meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style>
</head><body>
<div class="frame">
  <div class="row"><span class="tag">display-xl</span><span class="spec" style="font-size:64px; font-weight:900; line-height:1; letter-spacing:-0.02em">Swipe local</span><span class="meta">Fraunces 900<br>64/1.0</span></div>
  <div class="row"><span class="tag">display-l</span><span class="spec" style="font-size:48px; font-weight:700; line-height:1.05; letter-spacing:-0.015em">Cold outside?</span><span class="meta">Fraunces 700<br>48/1.05</span></div>
  <div class="row"><span class="tag">display-m</span><span class="spec" style="font-size:38px; font-weight:700; line-height:1.1; letter-spacing:-0.01em">Your cappuccino is waiting</span><span class="meta">Fraunces 700<br>38/1.1</span></div>
  <div class="row"><span class="tag">display-s</span><span class="spec" style="font-size:28px; font-weight:600; line-height:1.2">It's a match</span><span class="meta">Fraunces 600<br>28/1.2</span></div>
</div>
</body></html>
