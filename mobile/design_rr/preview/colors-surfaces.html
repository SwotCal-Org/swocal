<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 28px; font-family: var(--font-body); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { border-radius: 14px; overflow: hidden; background: var(--swo-paper); border: 1px solid var(--border-soft); box-shadow: var(--sh-1); }
.sw .c { height: 78px; border-bottom: 1px solid var(--border-soft); }
.sw .m { padding: 10px 12px; display:flex; flex-direction:column; gap:2px; }
.sw .n { font-size: 13px; font-weight: 600; color: var(--fg); }
.sw .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.sw .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="frame">
  <div class="grid">
    <div class="sw"><div class="c" style="background:#FBF5EA"></div><div class="m"><span class="n">Cream</span><span class="h">#FBF5EA</span><span class="v">--swo-cream · page</span></div></div>
    <div class="sw"><div class="c" style="background:#F2E9D6"></div><div class="m"><span class="n">Cream deep</span><span class="h">#F2E9D6</span><span class="v">--swo-cream-deep</span></div></div>
    <div class="sw"><div class="c" style="background:#FFFEFB"></div><div class="m"><span class="n">Paper</span><span class="h">#FFFEFB</span><span class="v">--swo-paper · card</span></div></div>
    <div class="sw"><div class="c" style="background:#F7ECD9"></div><div class="m"><span class="n">Shell</span><span class="h">#F7ECD9</span><span class="v">--swo-shell · alt</span></div></div>
  </div>
</div>
</body></html>
