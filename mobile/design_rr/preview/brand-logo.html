<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; }
.frame { width: 700px; background: var(--swo-cream); padding: 36px; font-family: var(--font-body); display: flex; gap: 30px; align-items: center; }
.logo { display: flex; align-items: baseline; gap: 0; }
.logo .word { font-family: var(--font-display); font-weight: 900; font-size: 56px; letter-spacing: -0.02em; color: var(--swo-ink); }
.logo .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--swo-coral); margin-left: 4px; align-self: flex-end; margin-bottom: 14px; }
.icon { width: 96px; height: 96px; border-radius: 22px; background: var(--swo-coral); border: 3px solid var(--swo-ink); position: relative; display: flex; align-items: center; justify-content: center; }
.icon .s { font-family: var(--font-display); font-weight: 900; font-size: 64px; color: var(--swo-cream); letter-spacing: -0.04em; line-height: 1; margin-top: -4px; }
.icon .pip { position: absolute; right: 18px; top: 38px; width: 14px; height: 14px; border-radius: 50%; background: var(--swo-mustard); border: 2px solid var(--swo-ink); }
.notes { font-size: 12px; color: var(--fg-3); }
.notes b { color: var(--fg); display: block; margin-bottom: 4px; font-size: 13px; }
</style>
</head><body>
<div class="frame">
  <div class="icon"><span class="s">s</span><span class="pip"></span></div>
  <div class="logo"><span class="word">swocal</span><span class="dot"></span></div>
  <div class="notes">
    <b>Wordmark + app icon</b>
    Fraunces 900 · -0.02em<br>
    coral dot &amp; mustard pip<br>
    espresso ink #2A1F1A
  </div>
</div>
</body></html>
