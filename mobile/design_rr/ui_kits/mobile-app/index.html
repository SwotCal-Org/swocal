<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Swocal — Mobile UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #2A1F1A; font-family: var(--font-body); }
  body { display: flex; align-items: center; justify-content: center; padding: 32px; gap: 32px; flex-wrap: wrap; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .label { font-family: var(--font-body); font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; letter-spacing: 0.04em; }
  .help {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
    font-size: 12px; padding: 8px 14px; border-radius: 999px;
    backdrop-filter: blur(6px); pointer-events: none;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="SwocalCard.jsx"></script>
<script type="text/babel" src="SwocalScreens.jsx"></script>

<div id="root" style="display: contents;"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const OFFERS = [
  {
    id: 'a', emoji: '☕', categoryEmoji: '☕', category: 'Coffee',
    photoBg: 'linear-gradient(135deg, #c69b6d 0%, #6b4a2e 100%)',
    discount: 15, timeLeft: '2h', distance: 200,
    headline: 'Cold outside? Your cappuccino is waiting.',
    merchant: 'Café Mayer', address: 'Marktplatz 4',
    expiresAt: '13:47', token: 'a1b2c3d4e5f6'
  },
  {
    id: 'b', emoji: '🥐', categoryEmoji: '🥐', category: 'Bakery',
    photoBg: 'linear-gradient(135deg, #e8b96a 0%, #a07338 100%)',
    discount: 12, timeLeft: '1h', distance: 90,
    headline: 'Just-baked croissants. Three left.',
    merchant: 'Bäckerei Weber', address: 'Königstraße 12',
    expiresAt: '12:30', token: 'b2c3d4e5f6a7'
  },
  {
    id: 'c', emoji: '🍜', categoryEmoji: '🍜', category: 'Restaurant',
    photoBg: 'linear-gradient(135deg, #d56a4a 0%, #6b2818 100%)',
    discount: 20, timeLeft: '3h', distance: 320,
    headline: 'Lunch dip — pad thai, half empty room.',
    merchant: 'Thai Kitchen', address: 'Gerberstraße 5',
    expiresAt: '14:15', token: 'c3d4e5f6a7b8'
  },
  {
    id: 'd', emoji: '🍰', categoryEmoji: '🍰', category: 'Dessert',
    photoBg: 'linear-gradient(135deg, #e7a6c8 0%, #8d4a6c 100%)',
    discount: 25, timeLeft: '4h', distance: 410,
    headline: 'Quiet afternoon? Cake is the answer.',
    merchant: 'Süßes Eck', address: 'Schlossplatz 8',
    expiresAt: '15:00', token: 'd4e5f6a7b8c9'
  },
];

function App() {
  const [view, setView] = useState('onboarding'); // onboarding | swipe | coupon
  const [prefs, setPrefs] = useState(['coffee', 'food', 'cozy']);
  const [stack, setStack] = useState(OFFERS);
  const [drag, setDrag] = useState({ x: 0, y: 0, dragging: false });
  const [matched, setMatched] = useState(null); // current offer match
  const [savedCoupon, setSavedCoupon] = useState(null);
  const [activeTab, setActiveTab] = useState('swipe');
  const dragStart = useRef(null);

  const top = stack[0];
  const next = stack[1];

  function togglePref(id) {
    setPrefs(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  }

  function startSwiping() { setView('swipe'); }

  function handlePointerDown(e) {
    if (!top) return;
    dragStart.current = { x: e.clientX, y: e.clientY };
    setDrag({ x: 0, y: 0, dragging: true });
  }
  function handlePointerMove(e) {
    if (!dragStart.current) return;
    setDrag({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y, dragging: true });
  }
  function handlePointerUp() {
    if (!dragStart.current) return;
    const { x } = drag;
    if (x > 100) commitSwipe('right');
    else if (x < -100) commitSwipe('left');
    else setDrag({ x: 0, y: 0, dragging: false });
    dragStart.current = null;
  }

  function commitSwipe(dir) {
    const offer = stack[0];
    // animate out
    setDrag({ x: dir === 'right' ? 600 : -600, y: 60, dragging: false });
    setTimeout(() => {
      setStack(s => s.slice(1));
      setDrag({ x: 0, y: 0, dragging: false });
      if (dir === 'right') setMatched(offer);
    }, 260);
  }

  function handleShowCoupon() {
    setSavedCoupon(matched);
    setMatched(null);
    setView('coupon');
    setActiveTab('coupons');
  }
  function handleDismissMatch() {
    setMatched(null);
  }
  function handleBackFromCoupon() {
    setView('swipe');
    setActiveTab('swipe');
  }

  // Calculate rotation for active card
  const rotate = drag.dragging || drag.x !== 0 ? drag.x * 0.06 : 0;

  // Screen content based on view
  let screen;
  if (view === 'onboarding') {
    screen = <OnboardingScreen selected={prefs} onToggle={togglePref} onContinue={startSwiping} />;
  } else if (view === 'coupon' && savedCoupon) {
    screen = <CouponScreen offer={savedCoupon} onBack={handleBackFromCoupon} />;
  } else {
    // swipe
    screen = (
      <div style={{ height: '100%', background: 'var(--swo-cream)', position: 'relative', overflow: 'hidden' }}>
        <ContextBar />

        {/* Card stack */}
        <div style={{
          position: 'absolute',
          top: 110, bottom: 180, left: 24, right: 24,
        }}
          onMouseDown={handlePointerDown}
          onMouseMove={handlePointerMove}
          onMouseUp={handlePointerUp}
          onMouseLeave={handlePointerUp}
        >
          {next && (
            <SwocalCard offer={next} style={{
              transform: 'scale(0.95) translateY(8px)',
              transition: 'transform 320ms',
            }}/>
          )}
          {top && (
            <SwocalCard
              offer={top}
              dragX={drag.x}
              dragY={drag.y}
              rotate={rotate}
            />
          )}
          {!top && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 30 }}>
              <div>
                <div style={{ fontSize: 36, marginBottom: 12 }}>🌤</div>
                <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700, lineHeight: 1.1, margin: '0 0 8px' }}>Nothing close to you right now.</h2>
                <p style={{ fontSize: 14, color: 'var(--swo-ink-2)', margin: 0 }}>Try again in 20 minutes — the lunch crowd is about to thin out.</p>
              </div>
            </div>
          )}
        </div>

        {/* Action FABs */}
        {top && (
          <div style={{ position: 'absolute', bottom: 110, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: 36, zIndex: 4 }}>
            <button onClick={() => commitSwipe('left')} style={{
              width: 60, height: 60, borderRadius: '50%',
              background: 'var(--swo-paper)',
              border: '2px solid var(--swo-ink-3)', color: 'var(--swo-ink-3)',
              fontSize: 22, cursor: 'pointer',
              boxShadow: '0 1px 0 rgba(70,40,20,.06), 0 4px 14px rgba(70,40,20,.10)',
            }}>✕</button>
            <button onClick={() => commitSwipe('right')} style={{
              width: 60, height: 60, borderRadius: '50%',
              background: 'var(--swo-mustard)',
              border: '2px solid var(--swo-ink)', color: 'var(--swo-ink)',
              fontSize: 26, cursor: 'pointer',
              boxShadow: '3px 4px 0 rgba(42,31,26,.55), 0 4px 14px rgba(70,40,20,.18)',
            }}>♥</button>
          </div>
        )}

        <BottomNav active={activeTab} onTab={t => {
          setActiveTab(t);
          if (t === 'coupons' && savedCoupon) setView('coupon');
          if (t === 'swipe') setView('swipe');
        }}/>

        {matched && (
          <MatchOverlay offer={matched} onShow={handleShowCoupon} onDismiss={handleDismissMatch}/>
        )}
      </div>
    );
  }

  return (
    <>
      <div className="stage">
        <span className="label">Swocal · Mobile · iPhone 14</span>
        <IOSDevice width={390} height={780}>
          <div data-screen-label="Swocal mobile" style={{ width: '100%', height: '100%' }}>
            {screen}
          </div>
        </IOSDevice>
      </div>
      <div className="help">Tap ♥ to match · ✕ to skip · or drag the card</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
